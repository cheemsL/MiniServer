<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <style>
        html, body{
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
        }
    </style>
    <link rel="stylesheet" href="/web/index.css">
</head>
<body>
    <div id="background-text">{{title}}</div>
    <div id="base-url-container">{{host_ip}}:{{port}}</div>
    <div id="message-container"></div>
    <div id="button-container">
        <div id="get-button" class="button">get</div>
        <div id="post-button" class="button">post</div>
        <div id="websocket-button" class="button">websocket</div>
    </div>
    <script type="module" src="/web/index.js"></script>
</body>
</html>
